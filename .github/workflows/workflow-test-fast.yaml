name: Fast Test Workflow

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  extract-test-cases:
    runs-on: ubuntu-latest
    outputs:
      cases: ${{ steps.get-cases.outputs.cases }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Extract workflow test cases from test.py
        id: get-cases
        run: |
          python .github/scripts/export_workflow_test_cases.py

  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black
      - name: Run black
        run: |
          black . --check

  pytest-fast:
    needs: extract-test-cases
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        case: ${{ fromJson(needs.extract-test-cases.outputs.cases) }}
    env:
      PYTHONUNBUFFERED: 1
    steps:
      - uses: actions/checkout@v6
      - name: Setup timezone
        run: sudo timedatectl set-timezone Europe/Kyiv
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run pytest
        env:
          FAST_RUN: 1
          API_HOST: ${{ secrets.API_HOST }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          DS_HOST: ${{ secrets.DS_HOST }}
          DS_USERNAME: ${{ secrets.DS_USERNAME }}
          DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
        run: |
          pytest procedure_tools/test.py::test_${{ matrix.case }}

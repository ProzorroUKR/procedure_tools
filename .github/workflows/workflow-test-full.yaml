name: Full Test Workflow

on: [workflow_dispatch]

jobs:
  extract-test-cases:
    runs-on: ubuntu-latest
    outputs:
      cases: ${{ steps.get-cases.outputs.cases }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up python 3.x
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Extract workflow test cases
        id: get-cases
        run: |
          python .github/scripts/export_workflow_test_cases.py

  pytest-full:
    needs: extract-test-cases
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        case: ${{ fromJson(needs.extract-test-cases.outputs.cases) }}
    env:
      PYTHONUNBUFFERED: 1
    steps:
      - uses: actions/checkout@v6
      - name: Setup timezone
        run: sudo timedatectl set-timezone Europe/Kyiv
      - name: Set up python 3.x
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run pytest
        env:
          API_HOST: ${{ secrets.API_HOST }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          DS_HOST: ${{ secrets.DS_HOST }}
          DS_USERNAME: ${{ secrets.DS_USERNAME }}
          DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
        run: |
          pytest procedure_tools/test.py::test_${{ matrix.case }}
